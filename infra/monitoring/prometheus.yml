global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    scrape_interval: 60s
    static_configs:
      - targets: ["localhost:9090"]

  # Host metrics via Node Exporter
  - job_name: node-exporter
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]

  # Container metrics via cAdvisor
  - job_name: cadvisor
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]

  # Grafana health
  - job_name: grafana
    scrape_interval: 60s
    static_configs:
      - targets: ["grafana:3000"]
